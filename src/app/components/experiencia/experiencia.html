<section class="experience-section">
    <h2 class="section-title">
        <span class="icon">📅</span> Experiência Profissional
    </h2>

    <div class="timeline">
        @for (exp of experiencias; track exp.periodo) {
            <div class="timeline-item" [class.isAtual]="exp.isAtual">
                <div class="timeline-dot">
                    @if (exp.isAtual) {
                        <span class="pulse"></span>
                    }
                </div>
                <div class="timeline-card">
                    <div class="card-header">
                        <div class="card-left">
                            <h3 class="role">{{ exp.funcao }}</h3>
                            <div class="meta">
                                <span class="company">{{ exp.empresa }}</span>
                                <span class="sep">•</span>
                                <span class="period">{{ exp.periodo }}</span>
                                @if (exp.isAtual) {
                                    <span class="badge-current">Em andamento</span>
                                }
                            </div>
                        </div>
                        <div class="tags">
                            @for (tag of exp.tags; track tag.label) {
                                <span class="tag" [class]="tag.class">{{ tag.label }}</span>
                            }
                        </div>
                    </div>
                    <p class="desc">{{ exp.descricao }}</p>
                </div>
            </div>
        }
    </div>
</section>
